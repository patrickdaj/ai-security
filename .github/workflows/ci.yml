name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check aug automation
      - name: Test
        run: pytest -q
      - name: Pipeline imports + help
        run: |
          python -c "import aug, automation; from automation.scanners import REGISTRY; print('scanners:', list(REGISTRY))"
          python -m automation --help

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Validate
        run: |
          for dir in terraform/automation modules/08-cloud-iac/project/terraform; do
            echo "== validating $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done
