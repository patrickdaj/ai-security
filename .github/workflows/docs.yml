name: docs

# Build the MkDocs site and publish it to the gh-pages branch on every push to
# main. Enable GitHub Pages (Settings → Pages → Deploy from branch → gh-pages)
# once after the first run.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "SHOWCASE.md"
      - "modules/**/README.md"
      - "labs/README.md"
      - "terraform/**/README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - name: Build and deploy
        run: mkdocs gh-deploy --force
