name: security-scan

# Dogfood: run the curriculum's own pipeline against this repo. Scheduled +
# on-demand + on PR. Produces a report artifact; triages with Claude when the
# ANTHROPIC_API_KEY secret is present, otherwise aggregates.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline + scanners
        run: |
          pip install -e . semgrep
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin || true
          curl -sfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | sh -s -- -b /usr/local/bin || true

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python -m automation --target . --out report --fail-on critical -v || true
          else
            echo "No ANTHROPIC_API_KEY secret — running aggregation only."
            python -m automation --target . --out report --no-triage -v || true
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report/
